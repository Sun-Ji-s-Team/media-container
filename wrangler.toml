name = "media-findai"
main = "dist/container.js"
compatibility_date = "2026-05-26"

[[containers]]
max_instances = 5
class_name = "MediaContainer"
image = "./Dockerfile"

[[containers]]
max_instances = 3
class_name = "BgRemovalContainer"
image = "./Dockerfile.bgremoval"

[[durable_objects.bindings]]
name = "MEDIA_CONTAINER"
class_name = "MediaContainer"

[[durable_objects.bindings]]
name = "BG_REMOVAL_CONTAINER"
class_name = "BgRemovalContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MediaContainer"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["BgRemovalContainer"]

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[vars]
APP_ENV = "production"
